name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: write 

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Publish Windows Executable
        run: dotnet publish Blitz3DDecomp.sln --configuration Release -r win-x64 --self-contained true -o ./publish_output

      - name: Zip the build output
        run: |
          cd publish_output
          zip -r ../B3DDecomp-Release.zip .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: B3DDecomp-Release.zip
